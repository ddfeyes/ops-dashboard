version: "3.9"

services:
  ops-dashboard:
    build: .
    image: ops-dashboard:latest
    container_name: ops-dashboard
    restart: unless-stopped
    env_file:
      - ops-dashboard.env
    ports:
      - "8090:8090"
    environment:
      - KANBAN_REPOS=ddfeyes/ops-dashboard,ddfeyes/svc-dash
      - GH_TOKEN=${GH_TOKEN}
      - SESSION_TOKEN_LIMIT=200000
      - SERVER_LABEL=Hetzner
      - WEEKLY_ALL_TOKEN_LIMIT=10000000
      - WEEKLY_SONNET_TOKEN_LIMIT=7500000
    volumes:
      - ./static:/app/static:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
