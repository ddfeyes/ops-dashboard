<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ops Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;

      --col-backlog:  rgba(139,148,158,0.10);
      --col-progress: rgba(88,166,255,0.12);
      --col-review:   rgba(227,179,65,0.11);
      --col-done:     rgba(63,185,80,0.10);
      --col-blocked:  rgba(248,81,73,0.12);

      --col-backlog-accent:  #8b949e;
      --col-progress-accent: #58a6ff;
      --col-review-accent:   #e3b341;
      --col-done-accent:     #3fb950;
      --col-blocked-accent:  #f85149;

      --surface-raised: #1c2128;  /* slightly lighter than --surface — raised elements */
      --surface-header: #1c2128;  /* panel headers, section dividers */

      --tag-feat:  #1f6feb; --tag-feat-bg:  #0d2245;
      --tag-fix:   #f85149; --tag-fix-bg:   #2d0d0d;
      --tag-infra: #a371f7; --tag-infra-bg: #1e1240;
      --tag-chore: #8b949e; --tag-chore-bg: var(--surface-raised);
      --tag-docs:  #39d353; --tag-docs-bg:  #0d2818;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      flex-shrink: 0;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .logo-icon { color: var(--accent); font-size: 14px; opacity: 0.9; }
    .logo-badge { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: var(--border); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: var(--muted);
      min-width: 120px;
      text-align: right;
    }
    #status.error { color: #f85149; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      /* 5 explicit rows so #system-hetzner (row 5) is properly sized within the
         fixed-height viewport — kanban gets the most space (2fr), secondary panels
         share the remaining fraction, usage+local share a short row, containers get
         a compact fixed min so it's always visible without overflow. */
      grid-template-rows:
        minmax(260px, 2fr)         /* row 1 — kanban (full-width), reduced min for short viewports */
        minmax(160px, 1.5fr)       /* row 2 — agents | hetzner-server */
        minmax(130px, 1fr)         /* row 3 — local | crons */
        minmax(90px, 0.7fr)        /* row 4 — usage */
        minmax(110px, 0.9fr);      /* row 5 — containers (full-width), total min ~750px */
      gap: 12px;
      height: calc(100vh - 48px);
      padding: 12px;
      min-height: 0;
      overflow: hidden;
    }
    /* Kanban: full-width row 1 */
    #kanban { grid-column: 1 / -1; grid-row: 1; }

    /* Agent Monitor: row 2 left */
    #agents { grid-column: 1; grid-row: 2; position: relative; }
    .scroll-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      background: linear-gradient(transparent, var(--surface));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 2;
    }
    .scroll-fade.visible { opacity: 1; }

    /* Hetzner Server: row 2 right */
    #system-server { grid-column: 2; grid-row: 2; }

    /* Local Machine: row 3 left */
    #system-local { grid-column: 1; grid-row: 3; }

    /* Crons: row 3 right */
    #crons { grid-column: 2; grid-row: 3; }

    /* Usage: row 4 left — spans both cols so it breathes */
    #usage { grid-column: 1 / -1; grid-row: 4; }

    /* Containers: full-width row 5 */
    #system-hetzner { grid-column: 1 / -1; grid-row: 5; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      height: 34px;
      flex-shrink: 0;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-header);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    /* Kanban header — primary panel gets dominant treatment */
    #kanban .panel-header {
      height: 38px;
      font-size: 11px;
      background: #1a2030;
      border-bottom-color: rgba(88,166,255,0.2);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
      padding: 10px;
    }

    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .mono {
      font-family: "JetBrains Mono", Consolas, monospace;
    }

    /* ── Board ── */
    /* The height chain: .panel (flex column) → .panel-body (flex:1, overflow-y:auto)
       → .board-wrapper (flex:1, height:100%) → #board-root (flex:1) → .board (flex row).
       Each step must propagate height so .col-cards can scroll internally. */
    .board-wrapper {
      padding: 0;
      height: 100%;
      overflow-x: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
    }
    .board-wrapper::-webkit-scrollbar { height: 4px; }
    .board-wrapper::-webkit-scrollbar-track { background: transparent; }
    .board-wrapper::-webkit-scrollbar-thumb { background: #58a6ff44; border-radius: 2px; }
    .scroll-hint {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--accent);
      opacity: 0.7;
    }
    .scroll-hint.visible { display: flex; }
    .done-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #3fb950;
    }
    .done-badge.visible { display: flex; }
    .done-badge:hover { opacity: 0.8; }
    .done-badge-count {
      background: rgba(63,185,80,0.15);
      color: #3fb950;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .done-expand-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 5px 0;
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.2);
      border-radius: var(--radius-sm);
      color: #3fb950;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .done-expand-btn:hover { background: rgba(63,185,80,0.16); }
    .done-expand-collapse { color: var(--muted); background: transparent; border-color: var(--border); }
    .done-expand-collapse:hover { background: var(--surface-raised); }
    /* #board-root is injected by JS inside .board-wrapper — must also flex so .board inherits height */
    #board-root {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .board {
      display: flex;
      gap: 0;
      min-width: 900px;
      align-items: stretch;
      height: 100%;
      flex: 1;
      min-height: 0;
    }

    /* ── Column ── */
    .column {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      border-radius: 0;
      border: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .column + .column {
      border-left: 1px solid var(--border);
    }
    .col-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .col-count {
      background: rgba(255,255,255,0.08);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .col-cards {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      /* Safety net: never taller than viewport minus the board header (~90px).
         Cards scroll within the column rather than pushing the layout. */
      max-height: calc(100vh - 160px);
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    .col-cards::-webkit-scrollbar { width: 3px; }
    .col-cards::-webkit-scrollbar-track { background: transparent; }
    .col-cards::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* Column themes — light tint + left border accent, no heavy fills */
    .col-backlog  { background: var(--col-backlog);  border-left: 3px solid var(--col-backlog-accent) !important; }
    .col-progress { background: var(--col-progress); border-left: 3px solid var(--col-progress-accent) !important; }
    .col-review   { background: var(--col-review);   border-left: 3px solid var(--col-review-accent) !important; }
    .col-done     { background: var(--col-done);     border-left: 3px solid var(--col-done-accent) !important; }
    .col-blocked  { background: var(--col-blocked);  border-left: 3px solid var(--col-blocked-accent) !important; }

    .col-backlog  .col-header { background: rgba(139,148,158,0.08); }
    .col-progress .col-header { background: rgba(88,166,255,0.10); }
    .col-review   .col-header { background: rgba(227,179,65,0.09); }
    .col-done     .col-header { background: rgba(63,185,80,0.09); }
    .col-blocked  .col-header { background: rgba(248,81,73,0.10); }

    .col-backlog  .col-header { color: var(--muted); }
    .col-progress .col-header { color: #79c0ff; }
    .col-review   .col-header { color: #e3b341; }
    .col-done     .col-header { color: #3fb950; }
    .col-blocked  .col-header { color: #f85149; }

    .col-count { color: var(--muted); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-id {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 8px;
      word-break: break-word;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tag-feat  { color: var(--tag-feat);  background: var(--tag-feat-bg); }
    .tag-fix   { color: var(--tag-fix);   background: var(--tag-fix-bg); }
    .tag-infra { color: var(--tag-infra); background: var(--tag-infra-bg); }
    .tag-chore { color: var(--tag-chore); background: var(--tag-chore-bg); }
    .tag-docs  { color: var(--tag-docs);  background: var(--tag-docs-bg); }
    .tag-other { color: var(--muted); background: var(--surface-raised); }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-agent {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .agent-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .card-time { font-size: 11px; color: var(--muted); }

    .pr-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #e3b341;
      text-decoration: none;
      border: 1px solid #7d4e0055;
      border-radius: 4px;
      padding: 1px 6px;
      background: #2d1e0055;
      transition: border-color 0.15s;
      margin-top: 6px;
    }
    .pr-link:hover { border-color: #e3b341; color: #e3b341; }
    .pr-icon { font-size: 10px; }

    .empty-col {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.6;
    }

    /* ── Loading / Error ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2d0d0d;
      border: 1px solid #8b1a1a;
      border-radius: 8px;
      padding: 16px 20px;
      color: #f85149;
      max-width: 500px;
      margin: 40px auto;
      font-size: 13px;
    }
    .error-box strong { display: block; margin-bottom: 6px; }

    /* ── Repo filter ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .toolbar-label { font-size: 12px; color: var(--muted); }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #0d2245; }
    .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* ── Agent Monitor ── */
    .panel-header .panel-count {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(88,166,255,0.10);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .agent-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6e7681;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }
    .agent-section-header:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    /* Session rows */
    .session-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 6px;
    }
    .session-row:last-child { margin-bottom: 0; }
    .session-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .status-running  { background: #3fb950; box-shadow: 0 0 4px #3fb95066; }
    .status-exited   { background: #f85149; }
    .status-idle     { background: #8b949e; }
    .status-unknown  { background: #30363d; }

    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-branch {
      font-size: 11px;
      color: var(--accent);
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .session-age { font-size: 11px; color: var(--muted); }
    .ci-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .ci-success  { color: #3fb950; background: #0d2818; }
    .ci-failure  { color: #f85149; background: #2d0d0d; }
    .ci-pending  { color: #e3b341; background: #2d1e00; }
    .ci-unknown  { color: var(--muted); background: var(--surface-raised); }
    .review-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #1e1240;
      color: #a371f7;
      font-weight: 500;
    }
    .pr-badge {
      font-size: 10px;
      color: #e3b341;
      text-decoration: none;
      border: 1px solid #7d4e0055;
      border-radius: 4px;
      padding: 1px 6px;
      background: #2d1e0055;
    }
    .pr-badge:hover { border-color: #e3b341; }

    /* OpenClaw agent cards */
    #agents-root {
      overflow-y: auto;
      max-height: calc(100% - 4px);
      height: 100%;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    #agents-root::-webkit-scrollbar { width: 3px; }
    #agents-root::-webkit-scrollbar-track { background: transparent; }
    #agents-root::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* Containers list — constrain height so all 26 containers are scrollable */
    #hetzner-root {
      max-height: 300px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }

    .agent-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 6px;
    }
    .agent-card:last-child { margin-bottom: 0; }
    .agent-emoji {
      font-size: 20px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .agent-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-active  { background: #3fb950; box-shadow: 0 0 4px #3fb95066; }
    .status-idle    { background: #e3b341; }
    .status-offline { background: #484f58; }
    .status-unknown { background: #30363d; }
    .agent-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .agent-status-label {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .agent-status-active  { color: #3fb950; background: #0d2818; }
    .agent-status-idle    { color: #e3b341; background: #2b2006; }
    .agent-status-offline { color: #8b949e; background: var(--surface-raised); }
    .agent-last-seen {
      font-size: 10px;
      color: #484f58;
      margin-left: auto;
    }
    .agent-model {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 3px;
    }
    .model-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .model-badge-opus   { background: rgba(163,113,247,0.18); color: #a371f7; border: 1px solid rgba(163,113,247,0.3); }
    .model-badge-sonnet { background: rgba(77,159,255,0.12);  color: #4d9fff; border: 1px solid rgba(77,159,255,0.25); }
    .model-badge-haiku  { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid rgba(139,148,158,0.25); }
    .model-badge-flash  { background: rgba(227,179,65,0.12);  color: #e3b341; border: 1px solid rgba(227,179,65,0.25); }
    .model-badge-gpt    { background: rgba(45,186,90,0.10);   color: #3fb950; border: 1px solid rgba(45,186,90,0.2); }
    .model-badge-gemini { background: rgba(248,81,73,0.10);   color: #f85149; border: 1px solid rgba(248,81,73,0.2); }
    .model-badge-other  { background: var(--surface-raised);  color: var(--muted); border: 1px solid var(--border); }
    .agent-workspace {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty-panel {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.6;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      min-height: 140px;
      color: #6e7681;
      font-size: 12px;
    }
    .empty-state-icon {
      font-size: 22px;
      opacity: 0.45;
    }
    .empty-state-detail {
      font-size: 11px;
      color: #484f58;
    }

    /* ── API Usage ── */
    .usage-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6e7681;
      padding: 6px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }
    .usage-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .usage-model-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 4px;
    }
    .usage-model-table td {
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .usage-model-table tr:last-child td { border-bottom: none; }
    .usage-model-table .um-name { color: var(--muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .usage-model-table .um-tokens { color: var(--text); text-align: right; font-weight: 600; }
    .usage-token-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 2px 0;
    }
    .usage-token-label { color: var(--muted); }
    .usage-token-value { font-family: "JetBrains Mono", Consolas, monospace; font-weight: 600; color: var(--text); }
    .usage-reset-info {
      font-size: 11px;
      color: #6e7681;
      margin-top: 4px;
      font-style: italic;
    }

    /* ── Cron Jobs ── */
    .cron-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .cron-row:last-child { border-bottom: none; }
    .cron-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cron-name { font-weight: 500; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cron-agent { font-size: 11px; color: var(--muted); }
    .cron-meta { font-size: 11px; color: var(--muted); font-family: "JetBrains Mono", Consolas, monospace; margin-left: auto; flex-shrink: 0; }
    .cron-dur-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .cron-dur-bar { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
    .cron-err-badge { background: rgba(248,81,73,0.18); color: #f85149; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

    /* ── System Metrics ── */
    .metric-row { margin-bottom: 12px; }
    .metric-row:last-child { margin-bottom: 0; }
    .metric-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .metric-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 500;
    }

    .metric-value {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      font-family: "JetBrains Mono", Consolas, monospace;
      min-width: 40px;
      text-align: right;
      opacity: 1;
      line-height: 1;
    }
    .metric-bar-outer {
      display: flex;
      align-items: center;
    }
    .metric-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .metric-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .bar-green  { color: #3fb950; }
    .bar-yellow { color: #e3b341; }
    .bar-red    { color: #f85149; }
    .metric-bar.bar-green  { background: #3fb950; }
    .metric-bar.bar-yellow { background: #e3b341; }
    .metric-bar.bar-red    { background: #f85149; }
    .metric-detail {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .metric-divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ── Compact metrics 2×2 grid ── */
    .metrics-compact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
      margin-top: 6px;
    }
    .metrics-compact-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .metrics-compact-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .metrics-compact-value {
      font-size: 11px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .metrics-compact-value.ok    { color: #3fb950; }
    .metrics-compact-value.warn  { color: #e3b341 !important; }
    .metrics-compact-value.high  { color: #f97316 !important; }
    .metrics-compact-value.crit  { color: #f85149 !important; }
    .metrics-compact-value.danger { color: #ff4444 !important; text-shadow: 0 0 8px rgba(255,68,68,0.5); }
    .metrics-compact-value.muted { color: var(--muted); }

    .containers-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .container-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .container-row:last-child { border-bottom: none; }
    .container-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }
    .container-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .container-image {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    .container-uptime {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .status-error {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #8b1a1a55;
      border-radius: 8px;
      background: #2d0d0d66;
      color: #f85149;
      font-size: 12px;
    }
    .status-error-icon { font-size: 14px; line-height: 1.2; }
    .status-error-detail {
      font-size: 11px;
      color: #8b949e;
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      body { overflow-y: auto; height: auto; }
      .app { height: auto; }
      .dashboard-grid {
        grid-template-columns: 1fr;
        /* 7 stacked panels on mobile — fixed heights so each panel has enough space */
        grid-template-rows: 500px 500px 360px 360px 360px 200px 360px;
        height: auto;
        overflow: visible;
      }
      /* Reset all column/row placements to natural stacking order */
      #kanban       { grid-column: 1; grid-row: auto; }
      #agents       { grid-column: 1; grid-row: auto; }
      #system-server { grid-column: 1; grid-row: auto; }
      #system-local { grid-column: 1; grid-row: auto; }
      #crons        { grid-column: 1; grid-row: auto; }
      #usage        { grid-column: 1; grid-row: auto; }
      #system-hetzner { grid-column: 1; grid-row: auto; }
      /* Kanban board stacks vertically on mobile */
      .board { min-width: unset; flex-direction: column; height: auto; }
      .column { max-width: 100%; }
      .column + .column { border-left: none; border-top: 1px solid var(--border); }
      /* Col-cards: remove viewport-relative max-height on mobile, use natural height */
      .col-cards { max-height: 300px; }
      .topbar { height: auto; padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
    }
    .alert-bar {
      display: none;
      align-items: center;
      gap: 8px;
      background: #2d0606;
      border-top: 1px solid #f85149;
      border-bottom: 1px solid #f85149;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #f85149;
      letter-spacing: 0.4px;
      font-family: 'JetBrains Mono', Consolas, monospace;
      flex-shrink: 0;
    }
    .alert-bar.visible {
      display: flex;
    }

    /* ── Pulse animation on active agent dots ── */
    @keyframes pulse-active {
      0%, 100% { box-shadow: 0 0 0 0 rgba(45,186,90,0.6); }
      50% { box-shadow: 0 0 0 4px rgba(45,186,90,0); }
    }
    .status-active { animation: pulse-active 2s ease-in-out infinite; }
    .agent-status-dot.status-active { animation: pulse-active 2s ease-in-out infinite; }

    /* ── Panel hover glow ── */
    .panel { transition: box-shadow 0.2s ease; }
    .panel:hover { box-shadow: 0 0 0 1px var(--border-mid), 0 4px 20px rgba(0,0,0,0.3); }
    #agents:hover    { box-shadow: 0 0 0 1px rgba(45,186,90,0.25), 0 4px 16px rgba(45,186,90,0.06); }
    #system-server:hover { box-shadow: 0 0 0 1px rgba(77,159,255,0.25), 0 4px 16px rgba(77,159,255,0.06); }
    #crons:hover     { box-shadow: 0 0 0 1px rgba(227,179,65,0.25), 0 4px 16px rgba(227,179,65,0.06); }
    #usage:hover     { box-shadow: 0 0 0 1px rgba(74,92,117,0.25), 0 4px 16px rgba(74,92,117,0.06); }
    #system-hetzner:hover { box-shadow: 0 0 0 1px rgba(45,186,90,0.25), 0 4px 16px rgba(45,186,90,0.06); }

    /* ── Active agent card highlight ── */
    .agent-card-active { background: rgba(45,186,90,0.04) !important; border-color: rgba(45,186,90,0.25) !important; }

    /* ── Container 2-column grid ── */
    .containers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .container-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-size: 10px;
      min-width: 0;
    }
    .container-cell-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-mono);
    }
    .container-cell-uptime {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    /* ── Container groups ── */
    .containers-grouped {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .container-group {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .container-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: var(--surface);
      font-size: 11px;
      font-weight: 600;
      cursor: default;
    }
    .container-group-name {
      flex: 1;
      font-family: var(--font-mono);
      color: var(--fg);
    }
    .container-group-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 6px;
      font-family: var(--font-mono);
    }
    .container-group-rows {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 4px;
      background: var(--bg);
    }
    .container-group-rows .container-cell {
      border: none;
      border-radius: 2px;
      background: var(--surface);
    }

    /* ── Refresh pulse dot ── */
    #refresh-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      opacity: 0;
      transition: opacity 0.1s;
    }
    #refresh-pulse.flash {
      opacity: 1;
      animation: pulse-fade 2s ease-out forwards;
    }
    @keyframes pulse-fade {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="header-left">
        <div class="logo"><span class="logo-icon">⬡</span> OpsDash <span class="logo-badge">LIVE</span></div>
      </div>
      <div class="header-right">
        <span id="refresh-pulse"></span>
        <span id="live-clock" class="mono" style="font-size:11px;color:var(--muted);letter-spacing:0.05em;"></span>
        <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
        <div id="status" class="mono">Loading…</div>
      </div>
    </header>
    <div id="alert-bar" class="alert-bar"></div>

    <main class="dashboard-grid">
      <section class="panel" id="kanban">
        <div class="panel-header">
          <span>Kanban <span id="kanban-total-count" class="panel-count mono" style="display:none"></span></span>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="done-badge" id="done-badge">
              ✓ Done <span class="done-badge-count" id="done-badge-count">0</span>
            </div>
            <div class="scroll-hint" id="scroll-hint">scroll → more columns</div>
            <div style="position:relative;display:flex;align-items:center;">
              <input id="kanban-search" type="text" placeholder="🔍 filter…"
                style="background:var(--surface-raised);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:3px 22px 3px 7px;width:110px;outline:none;font-family:var(--font-ui);"
                oninput="searchQuery=this.value;document.getElementById('ks-clear').style.display=this.value?'':'none';renderBoard(allCards);"
              />
              <span id="ks-clear" onclick="searchQuery='';document.getElementById('kanban-search').value='';this.style.display='none';renderBoard(allCards);"
                style="display:none;position:absolute;right:5px;cursor:pointer;color:var(--muted);font-size:12px;user-select:none;">×</span>
            </div>
            <div class="toolbar" id="toolbar"></div>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="board-wrapper" id="board-wrapper">
            <div id="board-root"></div>
          </div>
        </div>
      </section>

      <section class="panel" id="agents">
        <div class="panel-header"><span>Agent Monitor</span></div>
        <div class="panel-body">
          <div class="agent-section-header">
            <span>OpenClaw Agents</span>
            <span class="panel-count" id="agents-count">—</span>
          </div>
          <div id="agents-root"><div class="empty-panel">Loading…</div></div>
        </div>
        <div class="scroll-fade" id="agents-scroll-fade"></div>
      </section>

      <section class="panel" id="system-server">
        <div class="panel-header">
          <span>Hetzner Server</span>
          <span class="panel-count mono" id="mac-label">live</span>
        </div>
        <div class="panel-body" id="mac-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>

      <section class="panel" id="system-local">
        <div class="panel-header">
          <span>Local Machine</span>
          <span class="panel-count mono" id="local-label">—</span>
        </div>
        <div class="panel-body" id="local-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>

      <section class="panel" id="crons">
        <div class="panel-header">
          <span>Cron Jobs</span>
          <span class="panel-count" id="crons-count">—</span>
        </div>
        <div class="panel-body" id="crons-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>

      <section class="panel" id="usage">
        <div class="panel-header">
          <span>API Usage</span>
          <span class="panel-count mono" id="usage-label">↻ 30s</span>
        </div>
        <div class="panel-body" id="usage-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>

      <section class="panel" id="system-hetzner">
        <div class="panel-header">
          <span>Containers</span>
          <span class="panel-count mono" id="hetzner-label">—</span>
        </div>
        <div class="panel-body" id="hetzner-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const COLUMNS = [
      { key: "backlog",  label: "Backlog" },
      { key: "progress", label: "In Progress" },
      { key: "review",   label: "Review / PR" },
      { key: "done",     label: "Done" },
      { key: "blocked",  label: "Blocked" },
    ];

    const TAG_CLASS = { feat: "feat", fix: "fix", infra: "infra", chore: "chore", docs: "docs" };

    let allCards = [];
    let activeRepo = "all";
    let searchQuery = "";
    let refreshTimer = null;
    let countdown = 30;
    let doneExpanded = false;
    const DONE_PREVIEW = 10;

    function relTime(iso) {
      if (!iso) return "";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function shortId(id) {
      // "ddfeyes/ops-dashboard#13" → "ops-dashboard#13"
      const parts = id.split("/");
      return parts.length > 1 ? parts.slice(1).join("/") : id;
    }

    function cardHtml(card) {
      const tags = (card.tags || []).map(t => {
        const cls = TAG_CLASS[t] || "other";
        return `<span class="tag tag-${cls}">${t}</span>`;
      }).join("");

      const prLink = card.pr_url
        ? `<a class="pr-link" href="${card.pr_url}" target="_blank" rel="noopener">
             <span class="pr-icon">⤷</span> PR
           </a>`
        : "";

      const agentColor = card.agent_status === 'active' ? '#3fb950'
        : card.agent_status === 'idle' ? '#e3b341'
        : '#8b949e';
      const agent = card.agent
        ? `<span class="card-agent"><span class="agent-dot" style="background:${agentColor}"></span>${escHtml(card.agent)}</span>`
        : "";

      const ts = card.timestamp ? `<span class="card-time">${relTime(card.timestamp)}</span>` : "";

      return `
        <a class="card" href="${escHtml(card.url)}" target="_blank" rel="noopener">
          <div class="card-id">${shortId(card.id)}</div>
          <div class="card-title">${escHtml(card.title)}</div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ""}
          ${prLink}
          <div class="card-meta">${agent}${ts}</div>
        </a>`;
    }

    function escHtml(s) {
      const text = String(s ?? "");
      return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                 .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function getRepos(cards) {
      const set = new Set();
      cards.forEach(c => {
        const parts = c.id.split("#");
        if (parts.length > 0) set.add(parts[0]);
      });
      return [...set].sort();
    }

    function renderToolbar(cards) {
      const repos = getRepos(cards);
      if (repos.length <= 1) { document.getElementById("toolbar").innerHTML = ""; return; }

      const buttons = ["all", ...repos].map(r => {
        const active = r === activeRepo ? "active" : "";
        const label = r === "all" ? "All repos" : r.split("/")[1] || r;
        return `<button class="filter-btn ${active}" data-repo="${escHtml(r)}">${escHtml(label)}</button>`;
      }).join("");
      document.getElementById("toolbar").innerHTML =
        `<span class="toolbar-label">Repo:</span>${buttons}`;
      document.getElementById("toolbar").querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => setRepo(btn.dataset.repo));
      });
    }

    function setRepo(repo) {
      activeRepo = repo;
      renderBoard(allCards);
    }

    function renderBoard(cards) {
      renderToolbar(cards);
      const q = searchQuery.trim().toLowerCase();
      const filtered = cards
        .filter(c => activeRepo === "all" || c.id.startsWith(activeRepo + "#") || c.id.startsWith(activeRepo + "/"))
        .filter(c => !q || (c.title || "").toLowerCase().includes(q) || (c.id || "").toLowerCase().includes(q));

      const byCol = {};
      COLUMNS.forEach(c => { byCol[c.key] = []; });
      filtered.forEach(card => {
        const col = card.column in byCol ? card.column : "backlog";
        byCol[col].push(card);
      });

      const html = COLUMNS.filter(col => col.key === "backlog" || byCol[col.key].length > 0).map(col => {
        const colCards = byCol[col.key];
        let visibleCards = colCards;
        let expandToggle = "";
        if (col.key === "done" && colCards.length > DONE_PREVIEW && !doneExpanded) {
          visibleCards = colCards.slice(0, DONE_PREVIEW);
          const hidden = colCards.length - DONE_PREVIEW;
          expandToggle = `<button class="done-expand-btn" onclick="doneExpanded=true;renderBoard(allCards)">Show ${hidden} more ↓</button>`;
        } else if (col.key === "done" && colCards.length > DONE_PREVIEW && doneExpanded) {
          expandToggle = `<button class="done-expand-btn done-expand-collapse" onclick="doneExpanded=false;renderBoard(allCards)">Collapse ↑</button>`;
        }
        const cardsHtml = visibleCards.length
          ? visibleCards.map(cardHtml).join("")
          : `<div class="empty-col">No items</div>`;
        return `
          <div class="column col-${col.key}">
            <div class="col-header">
              <span>${col.label}</span>
              <span class="col-count">${colCards.length}</span>
            </div>
            <div class="col-cards">${cardsHtml}${expandToggle}</div>
          </div>`;
      }).join("");

      document.getElementById("board-root").innerHTML = `<div class="board">${html}</div>`;

      // Update kanban total count badge
      const totalCount = filtered.length;
      const ktcEl = document.getElementById("kanban-total-count");
      if(ktcEl){ktcEl.textContent=totalCount+" issues";ktcEl.style.display="";}

      // Show done badge (visible without scrolling) — click to scroll to Done column
      const doneCount = byCol["done"].length;
      const doneBadge = document.getElementById("done-badge");
      const doneBadgeCount = document.getElementById("done-badge-count");
      if (doneBadge && doneBadgeCount) {
        doneBadgeCount.textContent = doneCount;
        doneBadge.className = doneCount > 0 ? "done-badge visible" : "done-badge";
        doneBadge.onclick = () => {
          const wrapper = document.getElementById("board-wrapper");
          const doneCol = wrapper && wrapper.querySelector(".col-done");
          if (doneCol) doneCol.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        };
        doneBadge.style.cursor = doneCount > 0 ? "pointer" : "";
      }

      // Show scroll hint if board overflows
      setTimeout(() => {
        const wrapper = document.getElementById("board-wrapper");
        const hint = document.getElementById("scroll-hint");
        if (wrapper && hint) {
          const hasScroll = wrapper.scrollWidth > wrapper.clientWidth + 8;
          hint.className = hasScroll ? "scroll-hint visible" : "scroll-hint";
        }
      }, 500);
    }

    async function loadKanban() {
      clearInterval(refreshTimer);
      const btn = document.getElementById("refresh-btn");
      const status = document.getElementById("status");

      btn.disabled = true;
      status.textContent = "Fetching…";
      status.className = "";

      try {
        const res = await fetch("/api/kanban");
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const raw = await res.json();
        allCards = Array.isArray(raw) ? raw : [];
        renderBoard(allCards);
        const now = new Date().toLocaleTimeString();
        countdown = 30;
        status.textContent = `Updated ${now} · next in ${countdown}s`;
        status.className = "";

        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) {
            loadKanban();
          } else {
            const t = new Date().toLocaleTimeString();
            status.textContent = `Updated ${t.split(":").slice(0,2).join(":")}… · next in ${countdown}s`;
          }
        }, 1000);

      } catch (err) {
        document.getElementById("board-root").innerHTML =
          `<div class="error-box"><strong>Failed to load kanban data</strong>${escHtml(err.message)}</div>`;
        status.textContent = "Error — retrying in 30s";
        status.className = "error";
        countdown = 30;
        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) loadKanban();
        }, 1000);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Agent Monitor ──────────────────────────────────────────────

    function statusClass(status) {
      if (!status) return "status-unknown";
      const s = status.toLowerCase();
      if (s === "running") return "status-running";
      if (s === "exited") return "status-exited";
      if (s === "idle")   return "status-idle";
      return "status-unknown";
    }

    function ciClass(ci) {
      if (!ci) return "ci-unknown";
      const s = ci.toLowerCase();
      if (s === "success") return "ci-success";
      if (s === "failure" || s === "failed") return "ci-failure";
      if (s === "pending" || s === "in_progress") return "ci-pending";
      return "ci-unknown";
    }

    function sessionHtml(s) {
      const dotCls = statusClass(s.status);
      const nameLabel = escHtml(s.name || s.branch || "—");
      const branchLabel = s.branch && s.branch !== s.name ? `<div class="session-branch">${escHtml(s.branch)}</div>` : "";
      const age = s.age ? `<span class="session-age">${relTime(s.age)}</span>` : "";
      const ci = s.ci ? `<span class="ci-badge ${ciClass(s.ci)}">CI: ${escHtml(s.ci)}</span>` : "";
      const review = s.review ? `<span class="review-badge">${escHtml(s.review)}</span>` : "";
      const pr = s.pr_url ? `<a class="pr-badge" href="${escHtml(s.pr_url)}" target="_blank" rel="noopener">PR #${s.pr || ""}</a>` : "";
      return `
        <div class="session-row">
          <span class="session-status-dot ${dotCls}"></span>
          <div class="session-info">
            <div class="session-name">${nameLabel}</div>
            ${branchLabel}
            <div class="session-meta">${age}${ci}${review}${pr}</div>
          </div>
        </div>`;
    }

    function agentStatusDot(status) {
      if (status === "active")  return `<span class="agent-status-dot status-active" title="Active"></span>`;
      if (status === "idle")    return `<span class="agent-status-dot status-idle" title="Idle"></span>`;
      if (status === "offline") return `<span class="agent-status-dot status-offline" title="Offline"></span>`;
      return `<span class="agent-status-dot status-unknown" title="Unknown"></span>`;
    }

    function shortWorkspace(ws) {
      if (!ws) return "";
      // /Users/aivan/agents/lain → agents/lain
      return ws.replace(/^\/[^/]+\/[^/]+\//, "");
    }

    function agentCardHtml(a) {
      const emoji = a.emoji ? `<span class="agent-emoji">${escHtml(a.emoji)}</span>` : `<span class="agent-emoji">🤖</span>`;
      const name = escHtml(a.name || a.id || "—");
      const dot = agentStatusDot(a.status);
      const lastSeen = a.last_seen ? `<span class="agent-last-seen">${relTime(a.last_seen)}</span>` : "";
      const model = a.model ? (() => {
        const m = a.model.toLowerCase().replace(/^anthropic\//,"").replace(/^openai\//,"");
        let tier = "other", label = m;
        if (m.includes("opus"))   { tier = "opus";   label = "opus"; }
        else if (m.includes("sonnet")) { tier = "sonnet"; label = "sonnet"; }
        else if (m.includes("haiku"))  { tier = "haiku";  label = "haiku"; }
        else if (m.includes("flash"))  { tier = "flash";  label = "flash"; }
        else if (m.startsWith("gpt"))  { tier = "gpt";    label = m.split("-").slice(0,2).join("-"); }
        else if (m.includes("gemini")) { tier = "gemini"; label = "gemini"; }
        else label = m.split("-").slice(0,2).join("-");
        return `<div class="agent-model"><span class="model-badge model-badge-${escHtml(tier)}">${escHtml(label)}</span></div>`;
      })() : "";
      const ws = a.workspace ? `<div class="agent-workspace" title="${escHtml(a.workspace)}">${escHtml(shortWorkspace(a.workspace))}</div>` : "";
      const statusLabel = a.status ? `<span class="agent-status-label agent-status-${escHtml(a.status)}">${escHtml(a.status)}</span>` : "";
      const activeClass = a.status === "active" ? " agent-card-active" : "";
      return `
        <div class="agent-card${activeClass}">
          ${emoji}
          <div class="agent-info">
            <div class="agent-name-row">${dot}<span class="agent-name">${name}</span>${statusLabel}${lastSeen}</div>
            ${model}${ws}
          </div>
        </div>`;

    function renderAgents(data) {

    // ── System Metrics ─────────────────────────────────────────────

    function barClass(pct) {
      if (pct >= 80) return "bar-red";
      if (pct >= 60) return "bar-yellow";
      return "bar-green";
    }

    function metricBarHtml(label, pct, detail) {
      const cls = barClass(pct);
      const w = Math.min(Math.max(pct, 0), 100).toFixed(1);
      const detailHtml = detail ? `<div class="metric-detail">${escHtml(detail)}</div>` : "";
      return `
        <div class="metric-row">
          <div class="metric-label-row">
            <span class="metric-label">${escHtml(label)}</span>
            <span class="metric-value ${cls}">${pct.toFixed(1)}%</span>
          </div>
          <div class="metric-bar-outer">
            <div class="metric-bar-wrap">
              <div class="metric-bar ${cls}" style="width:${w}%"></div>
            </div>
          </div>
          ${detailHtml}

    function renderServerMetrics(server, rootId, labelId) {
      if (!server) {
        document.getElementById(rootId).innerHTML = `<div class="empty-panel" style="color:#f85149">No data</div>`;
        if (labelId) document.getElementById(labelId).textContent = "offline";
        return;
      }
      const mem = server.memory || {};
      const disk = server.disk || {};
      const memDetail = (mem.used_gb != null && mem.total_gb != null)
        ? `${mem.used_gb} GB / ${mem.total_gb} GB` : "";
      const diskDetail = (disk.used_gb != null && disk.total_gb != null)
        ? `${disk.used_gb} GB / ${disk.total_gb} GB` : "";

      if (labelId) {
        document.getElementById(labelId).textContent = server.hostname || "live";
      }

      // Freshness badge — only for local-root (push-env data can be stale)
      if (rootId === "local-root" && labelId) {
        const ageMs = server.computed_at ? Date.now() - new Date(server.computed_at).getTime() : 0;
        const existingBadge = document.getElementById("local-freshness-badge");
        if (existingBadge) existingBadge.remove();
        if (ageMs > 0) {
          const ageColor = ageMs > 1800000 ? "#f85149" : ageMs > 300000 ? "#e3b341" : "#8b949e";
          const badge = document.createElement("div");
          badge.id = "local-freshness-badge";
          badge.style.cssText = "font-size:10px;color:" + ageColor + ";margin-top:2px;";
          badge.textContent = "⏱ " + Math.round(ageMs / 60000) + "m ago";
          const labelEl = document.getElementById(labelId);
          if (labelEl && labelEl.parentNode) {
            labelEl.parentNode.insertBefore(badge, labelEl.nextSibling);
          }
        }
      }

      // Build compact 2×2 grid of secondary metrics
      const _compactItems = [];

      const _net = server.network || {};
      if (_net.bytes_sent != null) {
        const _fb = b => b > 1073741824 ? (b/1073741824).toFixed(1)+"GB" : b > 1048576 ? (b/1048576).toFixed(0)+"MB" : (b/1024).toFixed(0)+"KB";
        _compactItems.push(["NET ↑↓", _fb(_net.bytes_sent)+" / "+_fb(_net.bytes_recv), "muted"]);
      }

      if (server.uptime_seconds != null) {
        const _u = server.uptime_seconds;
        const _fmt = _u < 3600 ? Math.floor(_u/60)+"m" : _u < 86400 ? Math.floor(_u/3600)+"h "+Math.floor((_u%3600)/60)+"m" : Math.floor(_u/86400)+"d "+Math.floor((_u%86400)/3600)+"h";
        _compactItems.push(["UPTIME", _fmt, "muted"]);
      }

      const _load = server.load_avg || {};
      if (_load.load1 != null) {
        const _cpus = _load.cpu_count || 1;
        const _lCls = _load.load1 >= _cpus ? "crit" : _load.load1 >= _cpus*0.7 ? "warn" : "ok";
        _compactItems.push(["LOAD", _load.load1+" / "+_load.load5+" / "+_load.load15, _lCls]);
      }

      const _temps = server.temperatures || {};
      const _tempC = _temps.Tctl || _temps.Composite || null;
      if (_tempC != null) {
        const _tc = _tempC >= 95 ? "danger" : _tempC >= 90 ? "crit" : _tempC >= 85 ? "high" : _tempC > 70 ? "warn" : "ok";
        _compactItems.push(["TEMP", _tempC.toFixed(1)+"°C", _tc]);
      }

      const _grid = _compactItems.length ? `<div class="metrics-compact-grid">${
        _compactItems.map(([lbl, val, cls]) =>
          `<div class="metrics-compact-row">
      <span class="metrics-compact-label">${lbl}</span>
      <span class="metrics-compact-value ${cls}">${val}</span>
    </div>`
        ).join("")
      }</div>` : "";

      document.getElementById(rootId).innerHTML =
        metricBarHtml("CPU", server.cpu_percent || 0, "") +
        metricBarHtml("Memory", mem.percent || 0, memDetail) +
        metricBarHtml("Disk", disk.percent || 0, diskDetail) +
        _grid;
    }

    function renderContainersPanel(server) {
      const labelEl = document.getElementById("hetzner-label");
      const rootEl = document.getElementById("hetzner-root");

      if (!server) {
        rootEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🐳</div>
            <div>No server data</div>
            <div class="empty-state-detail">Server metrics unavailable</div>
          </div>`;
        labelEl.textContent = "—";
        return;
      }

      const containers = Array.isArray(server.containers) ? server.containers : [];
      const dockerAvailable = server.docker_available !== false;

      if (containers.length === 0) {
        if (!dockerAvailable) {
          rootEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🐳</div>
              <div>Docker unavailable</div>
              <div class="empty-state-detail">Mount /var/run/docker.sock to show containers</div>
            </div>`;
        } else {
          rootEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🐳</div>
              <div>No running containers</div>
              <div class="empty-state-detail">Docker is connected — no containers running</div>
            </div>`;
        }
        labelEl.textContent = "0 containers";
        return;
      }

      labelEl.textContent = `${containers.length} container${containers.length !== 1 ? "s" : ""}`;

      // Group containers by project prefix (first segment before '-' or '_')
      function containerPrefix(name) {
        // Special cases: keep multi-word prefixes together
        if (name.startsWith("ops-dashboard")) return "ops-dashboard";
        if (name.startsWith("mm-dashboard")) return "mm-dashboard";
        if (name.startsWith("tg-")) return "tg-bots";
        if (name.startsWith("trading_bot")) return "trading";
        const m = name.match(/^([a-z0-9]+)[-_]/);
        return m ? m[1] : name;
      }

      const groups = {};
      containers.forEach(c => {
        const name = c.Names || c.Name || c.ID || "?";
        const prefix = containerPrefix(name);
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(c);
      });

      const groupKeys = Object.keys(groups).sort();
      const useGrouped = groupKeys.length > 1 && groupKeys.length < containers.length;

      let html = "";
      if (useGrouped) {
        groupKeys.forEach(prefix => {
          const items = groups[prefix];
          const allOk = items.every(c => {
            const s = (c.Status || c.State || "").toLowerCase();
            return s.includes("up") || s.includes("running");
          });
          const groupDot = allOk ? "#3fb950" : "#f85149";
          const rows = items.map(c => {
            const name = c.Names || c.Name || c.ID || "?";
            const status = (c.Status || c.State || "").toLowerCase();
            const dotColor = status.includes("up") || status.includes("running") ? "#3fb950" : "#f85149";
            const startedAt = c.StartedAt || "";
            const uptime = startedAt ? relTime(startedAt) : "";
            return `<div class="container-cell">
              <span class="container-dot" style="background:${dotColor};flex-shrink:0"></span>
              <span class="container-cell-name">${escHtml(name)}</span>
              <span class="container-cell-uptime">${escHtml(uptime)}</span>
            </div>`;
          }).join("");
          html += `<div class="container-group">
            <div class="container-group-header">
              <span class="container-dot" style="background:${groupDot};flex-shrink:0"></span>
              <span class="container-group-name">${escHtml(prefix)}</span>
              <span class="container-group-count">${items.length}</span>
            </div>
            <div class="container-group-rows">${rows}</div>
          </div>`;
        });
        rootEl.innerHTML = `<div class="containers-label">Running containers</div><div class="containers-grouped">${html}</div>`;
      } else {
        const rows = containers.map(c => {
          const name = c.Names || c.Name || c.ID || "?";
          const status = (c.Status || c.State || "").toLowerCase();
          const dotColor = status.includes("up") || status.includes("running") ? "#3fb950" : "#f85149";
          const startedAt = c.StartedAt || "";
          const uptime = startedAt ? relTime(startedAt) : "";
          return `<div class="container-cell">
            <span class="container-dot" style="background:${dotColor};flex-shrink:0"></span>
            <span class="container-cell-name">${escHtml(name)}</span>
            <span class="container-cell-uptime">${escHtml(uptime)}</span>
          </div>`;
        }).join("");
        rootEl.innerHTML = `<div class="containers-label">Running containers</div><div class="containers-grid">${rows}</div>`;
      }
    }

    function checkAlerts(server) {
      const alerts = [];
      const temps = server.temperatures || {};
      const tempC = temps.Tctl || temps.Composite || null;
      if (tempC != null) {
        if (tempC >= 95) alerts.push("🔥 TEMP " + tempC.toFixed(1) + "°C DANGER — CHECK COOLING NOW");
        else if (tempC >= 90) alerts.push("🔴 TEMP " + tempC.toFixed(1) + "°C CRITICAL");
        else if (tempC >= 85) alerts.push("⚠️ TEMP " + tempC.toFixed(1) + "°C HIGH");
      }
      const load = server.load_avg || {};
      if (load.load1 != null && load.cpu_count && load.load1 >= load.cpu_count) {
        alerts.push("⚡ LOAD " + load.load1 + " / " + load.cpu_count + " CORES");
      }
      const disk = server.disk || {};
      if (disk.percent != null && disk.percent > 90) alerts.push("💾 DISK " + disk.percent.toFixed(0) + "% FULL");
      const bar = document.getElementById("alert-bar");
      if (!bar) return;
      if (alerts.length) {
        bar.textContent = "⚠ HETZNER: " + alerts.join(" · ");
        bar.classList.add('visible');
      } else {
        bar.classList.remove('visible');
      }
    }

    async function loadCrons() {
      try {
        const res = await fetch("/api/crons");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const jobs = await res.json();
        const countEl = document.getElementById("crons-count");
        const rootEl = document.getElementById("crons-root");
        if (countEl) countEl.textContent = jobs.length;
        if (!jobs.length) {
          if (rootEl) rootEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⏱</div><div>No cron jobs</div><div class="empty-state-detail">Set OPENCLAW_GATEWAY_CRONS_JSON env var</div></div>`;
          return;
        }
        jobs.sort((a, b) => (b.consecutive_errors || 0) - (a.consecutive_errors || 0));
        if (rootEl) rootEl.innerHTML = jobs.map(j => {
          const dotColor = j.consecutive_errors > 0 ? "#f85149" : j.last_status === "ok" ? "#3fb950" : "#e3b341";
          const interval = (() => {
            if (j.interval_min) return "every " + j.interval_min + "m";
            if (!j.schedule_expr) return "?";
            const e = j.schedule_expr.trim();
            // */N * * * *  → every Nm
            const everyMin = e.match(/^\*\/(\d+)\s+\*\s+\*\s+\*\s+\*$/);
            if (everyMin) return "every " + everyMin[1] + "m";
            // * */N * * *  → every Nh
            const everyHr = e.match(/^\*\s+\*\/(\d+)\s+\*\s+\*\s+\*$/);
            if (everyHr) return "every " + everyHr[1] + "h";
            // M H * * *  → daily HH:MM
            const daily = e.match(/^(\d+)\s+(\d+)\s+\*\s+\*\s+\*$/);
            if (daily) { const hh = daily[2].padStart(2,"0"), mm = daily[1].padStart(2,"0"); return "daily at " + hh + ":" + mm; }
            // M H * * 1-5 → weekdays at HH:MM
            const weekdays = e.match(/^(\d+)\s+(\d+)\s+\*\s+\*\s+1-5$/);
            if (weekdays) { const hh = weekdays[2].padStart(2,"0"), mm = weekdays[1].padStart(2,"0"); return "weekdays at " + hh + ":" + mm; }
            // 0 */N * * * → every Nh (hour-aligned)
            const everyHrAlt = e.match(/^0\s+\*\/(\d+)\s+\*\s+\*\s+\*$/);
            if (everyHrAlt) return "every " + everyHrAlt[1] + "h";
            // M * * * * → every hour at :MM
            const hourly = e.match(/^(\d+)\s+\*\s+\*\s+\*\s+\*$/);
            if (hourly) return "hourly at :" + hourly[1].padStart(2,"0");
            return e; // raw fallback
          })();
          const lastRun = j.last_run ? relTime(j.last_run) : "never";
          const dur = j.last_duration_ms ? Math.round(j.last_duration_ms / 1000) + "s" : "";
          const nextRunMs = j.next_run ? new Date(j.next_run).getTime() - Date.now() : 0;
          const nextStr = nextRunMs > 5000 ? "▶ in " + Math.round(nextRunMs / 60000) + "m" : "▶ now";
          const errBadge = j.consecutive_errors > 0 ? `<span class="cron-err-badge">${j.consecutive_errors} err</span>` : "";
          const errSeg = j.consecutive_errors > 0 ? ` · × ${j.consecutive_errors} errors` : "";
          const rowStyle = j.consecutive_errors > 0 ? ` style="background:rgba(248,81,73,0.06)"` : "";
                    // Duration bar
          let durBarHtml = "";
          if (j.last_duration_ms && j.interval_min) {
            const intervalMs = j.interval_min * 60 * 1000;
            const pct = Math.min(100, Math.round(j.last_duration_ms / intervalMs * 100));
            const barColor = pct > 80 ? "var(--red)" : pct > 50 ? "var(--yellow)" : "var(--green)";
            durBarHtml = `<div class="cron-dur-bar-wrap"><div class="cron-dur-bar" style="width:${pct}%;background:${barColor}" title="${dur} / ${j.interval_min}m (${pct}%)"></div></div>`;
          }
          return `<div class="cron-row"${rowStyle}>
            <span class="cron-dot" style="background:${dotColor}"></span>
            <div style="flex:1;min-width:0">
              <div class="cron-name">${escHtml(j.name)}${errBadge}</div>
              <div class="cron-agent">${escHtml(j.agent)} · ${escHtml(interval)}</div>
              ${durBarHtml}
            </div>
            <div class="cron-meta">${escHtml(lastRun)}${dur ? " · " + escHtml(dur) : ""}${errSeg} · ${escHtml(nextStr)}</div>
          </div>`;
        }).join("");
      } catch(e) {
        const rootEl = document.getElementById("crons-root");
        if (rootEl) rootEl.innerHTML = `<div class="empty-state">Cron data unavailable</div>`;
      }
    }

    // ── API Usage ─────────────────────────────────────────────────

    function fmtTokens(n) {
      if (n == null || isNaN(n)) return "0";
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000)    return (n / 1000).toFixed(1) + "k";
      return String(n);
    }

    function relWeekReset(isoStr) {
      if (!isoStr) return "";
      const diff = Math.max(0, new Date(isoStr).getTime() - Date.now());
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      if (days > 0) return `resets in ${days}d ${hours}h`;
      if (hours > 0) return `resets in ${hours}h`;
      return "resets soon";
    }

    function renderUsage(data) {
      const rootEl  = document.getElementById("usage-root");
      const labelEl = document.getElementById("usage-label");
      if (!rootEl) return;

      const sess      = data.current_session || {};
      const weekly    = data.weekly_all || {};
      const sessPct   = data.current_session_pct || 0;
      const wkAllPct  = data.weekly_all_pct || 0;
      const wkSonPct  = data.weekly_sonnet_pct || 0;
      const limits    = data.limits || {};
      const resetIso  = (data.reset_times || {}).weekly || "";
      const byModel   = weekly.by_model || {};

      // All-zeros / no-data detection — guard against 0% bars (gray track showing through)
      // pct can be 0 if limit is 0/missing; in that case treat as no data
      const hasSession = sess.total_tokens > 0 && sessPct > 0.1;
      const hasWeekly  = weekly.total_tokens > 0 && wkAllPct > 0.1;
      const allZero   = !hasSession && !hasWeekly;

      if (allZero) {
        rootEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <div>No usage data available</div>
            <div class="empty-state-detail">
              Claude Code logs not found on this host.<br>
              Mount ~/.claude/projects/ into the container to see live data.
            </div>
          </div>`;
        if (labelEl) labelEl.textContent = "no data";
        return;
      }

      if (labelEl) labelEl.textContent = "↻ 30s";

      // Current session section
      const sessTotal = sess.total_tokens || 0;
      const sessCls   = barClass(sessPct);
      const sessW     = Math.min(Math.max(sessPct, 0), 100).toFixed(1);

      // Weekly totals section
      const wkTotal   = weekly.total_tokens || 0;
      const wkSonnet  = weekly.sonnet_tokens || 0;
      const wkAllCls  = barClass(wkAllPct);
      const wkAllW    = Math.min(Math.max(wkAllPct, 0), 100).toFixed(1);
      const wkSonCls  = barClass(wkSonPct);
      const wkSonW    = Math.min(Math.max(wkSonPct, 0), 100).toFixed(1);

      // Model breakdown rows (sort by total desc)
      const modelRows = Object.entries(byModel)
        .map(([m, c]) => ({ name: m, total: (c.input_tokens || 0) + (c.output_tokens || 0) }))
        .sort((a, b) => b.total - a.total);

      const modelHtml = modelRows.length
        ? `<table class="usage-model-table">
            ${modelRows.map(r => `
              <tr>
                <td class="um-name" title="${escHtml(r.name)}">${escHtml(r.name.replace("claude-","").replace("anthropic/",""))}</td>
                <td class="um-tokens">${fmtTokens(r.total)}</td>
              </tr>`).join("")}
           </table>`
        : `<div style="font-size:11px;color:var(--muted);padding:4px 0">No model data</div>`;

      rootEl.innerHTML = `
        <div class="usage-section-label">Current Session</div>
        <div class="usage-token-row">
          <span class="usage-token-label">Input</span>
          <span class="usage-token-value">${fmtTokens(sess.input_tokens)}</span>
        </div>
        <div class="usage-token-row">
          <span class="usage-token-label">Output</span>
          <span class="usage-token-value">${fmtTokens(sess.output_tokens)}</span>
        </div>
        <div class="usage-token-row">
          <span class="usage-token-label">Cache</span>
          <span class="usage-token-value">${fmtTokens((sess.cache_creation_tokens||0) + (sess.cache_read_tokens||0))}</span>
        </div>
        <div class="metric-row" style="margin-top:6px">
          <div class="metric-label-row">
            <span class="metric-label">Session limit</span>
            <span class="metric-value ${sessCls}">${sessPct.toFixed(1)}%</span>
          </div>
          <div class="metric-bar-outer">
            <div class="metric-bar-wrap">
              <div class="metric-bar ${sessCls}" style="width:${sessW}%"></div>
            </div>
          </div>
          <div class="metric-detail">${fmtTokens(sessTotal)} / ${fmtTokens(limits.session_token_limit)}</div>
        </div>

        <div class="usage-section-label" style="margin-top:10px">Weekly Totals</div>
        <div class="metric-row">
          <div class="metric-label-row">
            <span class="metric-label">All tokens</span>
            <span class="metric-value ${wkAllCls}">${wkAllPct.toFixed(1)}%</span>
          </div>
          <div class="metric-bar-outer">
            <div class="metric-bar-wrap">
              <div class="metric-bar ${wkAllCls}" style="width:${wkAllW}%"></div>
            </div>
          </div>
          <div class="metric-detail">${fmtTokens(wkTotal)} / ${fmtTokens(limits.weekly_all_token_limit)}</div>
        </div>
        <div class="metric-row">
          <div class="metric-label-row">
            <span class="metric-label">Sonnet tokens</span>
            <span class="metric-value ${wkSonCls}">${wkSonPct.toFixed(1)}%</span>
          </div>
          <div class="metric-bar-outer">
            <div class="metric-bar-wrap">
              <div class="metric-bar ${wkSonCls}" style="width:${wkSonW}%"></div>
            </div>
          </div>
          <div class="metric-detail">${fmtTokens(wkSonnet)} / ${fmtTokens(limits.weekly_sonnet_token_limit)}</div>
        </div>
        ${resetIso ? `<div class="usage-reset-info">⏱ ${relWeekReset(resetIso)}</div>` : ""}

        <div class="usage-section-label" style="margin-top:10px">Model Breakdown (week)</div>
        ${modelHtml}
      `;
    }

    async function loadUsage() {
      try {
        const res = await fetch("/api/usage");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderUsage(data);
      } catch (err) {
        const rootEl = document.getElementById("usage-root");
        if (rootEl) rootEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📊</div>
            <div>Usage data unavailable</div>
            <div class="empty-state-detail">${escHtml(err.message)}</div>
          </div>`;
      }
    }

    function loadAll() {
      loadKanban();
      loadAgents();
      loadSystem();
      loadCrons();
      loadUsage();
      setTimeout(()=>{const p=document.getElementById("refresh-pulse");if(p){p.className="flash";setTimeout(()=>{p.className=""},2000);}}, 500);
    }

    // Live clock
    function updateClock() { const n = new Date(); document.getElementById("live-clock").textContent = n.toTimeString().slice(0,8); }
    setInterval(updateClock, 1000); updateClock();

    // Initial load
    document.getElementById("board-root").innerHTML =
      `<div class="loading-overlay"><div class="spinner"></div><span>Loading kanban…</span></div>`;
    loadAll();

    // Refresh all panels every 30s
    agentsRefreshTimer = setInterval(loadAgents, 30000);
    setInterval(loadSystem, 30000);
    setInterval(loadCrons, 60000);
    setInterval(loadUsage, 30000);
  </script>
</body>
</html>
