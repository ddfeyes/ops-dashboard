<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ops Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;

      --col-backlog:  rgba(139,148,158,0.05);
      --col-progress: rgba(88,166,255,0.06);
      --col-review:   rgba(227,179,65,0.06);
      --col-done:     rgba(63,185,80,0.06);
      --col-blocked:  rgba(248,81,73,0.06);

      --col-backlog-accent:  #8b949e;
      --col-progress-accent: #58a6ff;
      --col-review-accent:   #e3b341;
      --col-done-accent:     #3fb950;
      --col-blocked-accent:  #f85149;

      --tag-feat:  #1f6feb; --tag-feat-bg:  #0d2245;
      --tag-fix:   #f85149; --tag-fix-bg:   #2d0d0d;
      --tag-infra: #a371f7; --tag-infra-bg: #1e1240;
      --tag-chore: #8b949e; --tag-chore-bg: #21262d;
      --tag-docs:  #39d353; --tag-docs-bg:  #0d2818;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      flex-shrink: 0;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: var(--border); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: var(--muted);
      min-width: 120px;
      text-align: right;
    }
    #status.error { color: #f85149; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      height: calc(100vh - 48px);
      padding: 12px;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      height: 40px;
      flex-shrink: 0;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #21262d;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: auto;
      padding: 10px;
    }

    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .mono {
      font-family: "JetBrains Mono", Consolas, monospace;
    }

    /* ── Board ── */
    .board-wrapper {
      padding: 0;
      height: 100%;
      overflow-x: auto;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
    }
    .board-wrapper::-webkit-scrollbar { height: 4px; }
    .board-wrapper::-webkit-scrollbar-track { background: transparent; }
    .board-wrapper::-webkit-scrollbar-thumb { background: #58a6ff44; border-radius: 2px; }
    .scroll-hint {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--accent);
      opacity: 0.7;
    }
    .scroll-hint.visible { display: flex; }
    .done-badge {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #3fb950;
    }
    .done-badge.visible { display: flex; }
    .done-badge:hover { opacity: 0.8; }
    .done-badge-count {
      background: rgba(63,185,80,0.15);
      color: #3fb950;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .board {
      display: flex;
      gap: 0;
      min-width: 900px;
      align-items: stretch;
      height: 100%;
      flex: 1;
      min-height: 0;
    }

    /* ── Column ── */
    .column {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      border-radius: 0;
      border: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .column + .column {
      border-left: 1px solid var(--border);
    }
    .col-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .col-count {
      background: rgba(255,255,255,0.08);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .col-cards {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    .col-cards::-webkit-scrollbar { width: 3px; }
    .col-cards::-webkit-scrollbar-track { background: transparent; }
    .col-cards::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* Column themes — light tint + left border accent, no heavy fills */
    .col-backlog  { background: var(--col-backlog);  border-left: 2px solid var(--col-backlog-accent) !important; }
    .col-progress { background: var(--col-progress); border-left: 2px solid var(--col-progress-accent) !important; }
    .col-review   { background: var(--col-review);   border-left: 2px solid var(--col-review-accent) !important; }
    .col-done     { background: var(--col-done);     border-left: 2px solid var(--col-done-accent) !important; }
    .col-blocked  { background: var(--col-blocked);  border-left: 2px solid var(--col-blocked-accent) !important; }

    .col-backlog  .col-header { color: var(--muted); }
    .col-progress .col-header { color: #79c0ff; }
    .col-review   .col-header { color: #e3b341; }
    .col-done     .col-header { color: #3fb950; }
    .col-blocked  .col-header { color: #f85149; }

    .col-count { color: var(--muted); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-id {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 8px;
      word-break: break-word;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tag-feat  { color: var(--tag-feat);  background: var(--tag-feat-bg); }
    .tag-fix   { color: var(--tag-fix);   background: var(--tag-fix-bg); }
    .tag-infra { color: var(--tag-infra); background: var(--tag-infra-bg); }
    .tag-chore { color: var(--tag-chore); background: var(--tag-chore-bg); }
    .tag-docs  { color: var(--tag-docs);  background: var(--tag-docs-bg); }
    .tag-other { color: var(--muted); background: #21262d; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-agent {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .agent-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .card-time { font-size: 11px; color: var(--muted); }

    .pr-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #e3b341;
      text-decoration: none;
      border: 1px solid #7d4e0055;
      border-radius: 4px;
      padding: 1px 6px;
      background: #2d1e0055;
      transition: border-color 0.15s;
      margin-top: 6px;
    }
    .pr-link:hover { border-color: #e3b341; color: #e3b341; }
    .pr-icon { font-size: 10px; }

    .empty-col {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.6;
    }

    /* ── Loading / Error ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2d0d0d;
      border: 1px solid #8b1a1a;
      border-radius: 8px;
      padding: 16px 20px;
      color: #f85149;
      max-width: 500px;
      margin: 40px auto;
      font-size: 13px;
    }
    .error-box strong { display: block; margin-bottom: 6px; }

    /* ── Repo filter ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .toolbar-label { font-size: 12px; color: var(--muted); }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #0d2245; }
    .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* ── Agent Monitor ── */
    .panel-count {
      background: rgba(255,255,255,0.08);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .agent-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6e7681;
      border-top: 1px solid #21262d;
      margin-top: 10px;
    }
    .agent-section-header:first-child {
      border-top: none;
      margin-top: 0;
      padding-top: 0;
    }

    /* Session rows */
    .session-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 6px;
    }
    .session-row:last-child { margin-bottom: 0; }
    .session-status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .status-running  { background: #3fb950; box-shadow: 0 0 4px #3fb95066; }
    .status-exited   { background: #f85149; }
    .status-idle     { background: #8b949e; }
    .status-unknown  { background: #30363d; }

    .session-info { flex: 1; min-width: 0; }
    .session-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-branch {
      font-size: 11px;
      color: var(--accent);
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .session-age { font-size: 11px; color: var(--muted); }
    .ci-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .ci-success  { color: #3fb950; background: #0d2818; }
    .ci-failure  { color: #f85149; background: #2d0d0d; }
    .ci-pending  { color: #e3b341; background: #2d1e00; }
    .ci-unknown  { color: var(--muted); background: #21262d; }
    .review-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #1e1240;
      color: #a371f7;
      font-weight: 500;
    }
    .pr-badge {
      font-size: 10px;
      color: #e3b341;
      text-decoration: none;
      border: 1px solid #7d4e0055;
      border-radius: 4px;
      padding: 1px 6px;
      background: #2d1e0055;
    }
    .pr-badge:hover { border-color: #e3b341; }

    /* OpenClaw agent cards */
    #agents-root {
      overflow-y: auto;
      max-height: 380px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    #agents-root::-webkit-scrollbar { width: 3px; }
    #agents-root::-webkit-scrollbar-track { background: transparent; }
    #agents-root::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    /* Containers list — constrain height so all 26 containers are scrollable */
    #hetzner-root {
      max-height: 300px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }

    .agent-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 6px;
    }
    .agent-card:last-child { margin-bottom: 0; }
    .agent-emoji {
      font-size: 20px;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .agent-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-active  { background: #3fb950; box-shadow: 0 0 4px #3fb95066; }
    .status-idle    { background: #e3b341; }
    .status-offline { background: #484f58; }
    .status-unknown { background: #30363d; }
    .agent-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    .agent-status-label {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .agent-status-active  { color: #3fb950; background: #0d2818; }
    .agent-status-idle    { color: #e3b341; background: #2b2006; }
    .agent-status-offline { color: #8b949e; background: #21262d; }
    .agent-last-seen {
      font-size: 10px;
      color: #484f58;
      margin-left: auto;
    }
    .agent-model {
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 2px;
    }
    .agent-workspace {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty-panel {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.6;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      min-height: 140px;
      color: #6e7681;
      font-size: 12px;
    }
    .empty-state-icon {
      font-size: 22px;
      opacity: 0.45;
    }
    .empty-state-detail {
      font-size: 11px;
      color: #484f58;
    }

    /* ── System Metrics ── */
    .metric-row { margin-bottom: 12px; }
    .metric-row:last-child { margin-bottom: 0; }
    .metric-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .metric-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 500;
    }

    .metric-value {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      font-family: "JetBrains Mono", Consolas, monospace;
      min-width: 40px;
      text-align: right;
      opacity: 1;
      line-height: 1;
    }
    .metric-bar-outer {
      display: flex;
      align-items: center;
    }
    .metric-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .metric-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .bar-green  { color: #3fb950; }
    .bar-yellow { color: #e3b341; }
    .bar-red    { color: #f85149; }
    .metric-bar.bar-green  { background: #3fb950; }
    .metric-bar.bar-yellow { background: #e3b341; }
    .metric-bar.bar-red    { background: #f85149; }
    .metric-detail {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .metric-divider { height: 1px; background: var(--border); margin: 12px 0; }
    .containers-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .container-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text);
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .container-row:last-child { border-bottom: none; }
    .container-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }
    .container-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "JetBrains Mono", Consolas, monospace;
    }
    .container-image {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    .status-error {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #8b1a1a55;
      border-radius: 8px;
      background: #2d0d0d66;
      color: #f85149;
      font-size: 12px;
    }
    .status-error-icon { font-size: 14px; line-height: 1.2; }
    .status-error-detail {
      font-size: 11px;
      color: #8b949e;
      font-family: "JetBrains Mono", Consolas, monospace;
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      body { overflow-y: auto; height: auto; }
      .app { height: auto; }
      .dashboard-grid {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 360px);
        height: auto;
      }
      .board { min-width: unset; flex-direction: column; }
      .column { max-width: 100%; }
      .column + .column { border-left: none; border-top: 1px solid var(--border); }
      .topbar { height: auto; padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="header-left">
        <div class="logo">OpsDashboard</div>
      </div>
      <div class="header-right">
        <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
        <div id="status" class="mono">Loading…</div>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="panel" id="kanban">
        <div class="panel-header">
          <span>Kanban</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="done-badge" id="done-badge">
              ✓ Done <span class="done-badge-count" id="done-badge-count">0</span>
            </div>
            <div class="scroll-hint" id="scroll-hint">scroll → more columns</div>
            <div class="toolbar" id="toolbar"></div>
          </div>
        </div>
        <div class="panel-body" style="padding:0;">
          <div class="board-wrapper" id="board-wrapper">
            <div id="board-root"></div>
          </div>
        </div>
      </section>

      <section class="panel" id="agents">
        <div class="panel-header"><span>Agent Monitor</span></div>
        <div class="panel-body">
          <div class="agent-section-header">
            <span>OpenClaw Agents</span>
            <span class="panel-count" id="agents-count">—</span>
          </div>
          <div id="agents-root"><div class="empty-panel">Loading…</div></div>
        </div>
      </section>

      <section class="panel" id="system-mac">
        <div class="panel-header">
          <span>Hetzner Server</span>
          <span class="panel-count mono" id="mac-label">live</span>
        </div>
        <div class="panel-body" id="mac-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>

      <section class="panel" id="system-hetzner">
        <div class="panel-header">
          <span>Containers</span>
          <span class="panel-count mono" id="hetzner-label">—</span>
        </div>
        <div class="panel-body" id="hetzner-root">
          <div class="empty-panel">Loading…</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const COLUMNS = [
      { key: "backlog",  label: "Backlog" },
      { key: "progress", label: "In Progress" },
      { key: "review",   label: "Review / PR" },
      { key: "done",     label: "Done" },
      { key: "blocked",  label: "Blocked" },
    ];

    const TAG_CLASS = { feat: "feat", fix: "fix", infra: "infra", chore: "chore", docs: "docs" };

    let allCards = [];
    let activeRepo = "all";
    let refreshTimer = null;
    let countdown = 30;

    function relTime(iso) {
      if (!iso) return "";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function shortId(id) {
      // "ddfeyes/ops-dashboard#13" → "ops-dashboard#13"
      const parts = id.split("/");
      return parts.length > 1 ? parts.slice(1).join("/") : id;
    }

    function cardHtml(card) {
      const tags = (card.tags || []).map(t => {
        const cls = TAG_CLASS[t] || "other";
        return `<span class="tag tag-${cls}">${t}</span>`;
      }).join("");

      const prLink = card.pr_url
        ? `<a class="pr-link" href="${card.pr_url}" target="_blank" rel="noopener">
             <span class="pr-icon">⤷</span> PR
           </a>`
        : "";

      const agent = card.agent
        ? `<span class="card-agent"><span class="agent-dot"></span>${escHtml(card.agent)}</span>`
        : "";

      const ts = card.timestamp ? `<span class="card-time">${relTime(card.timestamp)}</span>` : "";

      return `
        <a class="card" href="${escHtml(card.url)}" target="_blank" rel="noopener">
          <div class="card-id">${shortId(card.id)}</div>
          <div class="card-title">${escHtml(card.title)}</div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ""}
          ${prLink}
          <div class="card-meta">${agent}${ts}</div>
        </a>`;
    }

    function escHtml(s) {
      const text = String(s ?? "");
      return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                 .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function getRepos(cards) {
      const set = new Set();
      cards.forEach(c => {
        const parts = c.id.split("#");
        if (parts.length > 0) set.add(parts[0]);
      });
      return [...set].sort();
    }

    function renderToolbar(cards) {
      const repos = getRepos(cards);
      if (repos.length <= 1) { document.getElementById("toolbar").innerHTML = ""; return; }

      const buttons = ["all", ...repos].map(r => {
        const active = r === activeRepo ? "active" : "";
        const label = r === "all" ? "All repos" : r.split("/")[1] || r;
        return `<button class="filter-btn ${active}" data-repo="${escHtml(r)}">${escHtml(label)}</button>`;
      }).join("");
      document.getElementById("toolbar").innerHTML =
        `<span class="toolbar-label">Repo:</span>${buttons}`;
      document.getElementById("toolbar").querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => setRepo(btn.dataset.repo));
      });
    }

    function setRepo(repo) {
      activeRepo = repo;
      renderBoard(allCards);
    }

    function renderBoard(cards) {
      renderToolbar(cards);
      const filtered = activeRepo === "all"
        ? cards
        : cards.filter(c => c.id.startsWith(activeRepo + "#") || c.id.startsWith(activeRepo + "/"));

      const byCol = {};
      COLUMNS.forEach(c => { byCol[c.key] = []; });
      filtered.forEach(card => {
        const col = card.column in byCol ? card.column : "backlog";
        byCol[col].push(card);
      });

      const html = COLUMNS.map(col => {
        const colCards = byCol[col.key];
        const cardsHtml = colCards.length
          ? colCards.map(cardHtml).join("")
          : `<div class="empty-col">No items</div>`;
        return `
          <div class="column col-${col.key}">
            <div class="col-header">
              <span>${col.label}</span>
              <span class="col-count">${colCards.length}</span>
            </div>
            <div class="col-cards">${cardsHtml}</div>
          </div>`;
      }).join("");

      document.getElementById("board-root").innerHTML = `<div class="board">${html}</div>`;

      // Show done badge (visible without scrolling) — click to scroll to Done column
      const doneCount = byCol["done"].length;
      const doneBadge = document.getElementById("done-badge");
      const doneBadgeCount = document.getElementById("done-badge-count");
      if (doneBadge && doneBadgeCount) {
        doneBadgeCount.textContent = doneCount;
        doneBadge.className = doneCount > 0 ? "done-badge visible" : "done-badge";
        doneBadge.onclick = () => {
          const wrapper = document.getElementById("board-wrapper");
          const doneCol = wrapper && wrapper.querySelector(".col-done");
          if (doneCol) doneCol.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        };
        doneBadge.style.cursor = doneCount > 0 ? "pointer" : "";
      }

      // Show scroll hint if board overflows
      setTimeout(() => {
        const wrapper = document.getElementById("board-wrapper");
        const hint = document.getElementById("scroll-hint");
        if (wrapper && hint) {
          const hasScroll = wrapper.scrollWidth > wrapper.clientWidth + 8;
          hint.className = hasScroll ? "scroll-hint visible" : "scroll-hint";
        }
      }, 50);
    }

    async function loadKanban() {
      clearInterval(refreshTimer);
      const btn = document.getElementById("refresh-btn");
      const status = document.getElementById("status");

      btn.disabled = true;
      status.textContent = "Fetching…";
      status.className = "";

      try {
        const res = await fetch("/api/kanban");
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const raw = await res.json();
        allCards = Array.isArray(raw) ? raw : [];
        renderBoard(allCards);
        const now = new Date().toLocaleTimeString();
        countdown = 30;
        status.textContent = `Updated ${now} · next in ${countdown}s`;
        status.className = "";

        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) {
            loadKanban();
          } else {
            const t = new Date().toLocaleTimeString();
            status.textContent = `Updated ${t.split(":").slice(0,2).join(":")}… · next in ${countdown}s`;
          }
        }, 1000);

      } catch (err) {
        document.getElementById("board-root").innerHTML =
          `<div class="error-box"><strong>Failed to load kanban data</strong>${escHtml(err.message)}</div>`;
        status.textContent = "Error — retrying in 30s";
        status.className = "error";
        countdown = 30;
        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) loadKanban();
        }, 1000);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Agent Monitor ──────────────────────────────────────────────

    function statusClass(status) {
      if (!status) return "status-unknown";
      const s = status.toLowerCase();
      if (s === "running") return "status-running";
      if (s === "exited") return "status-exited";
      if (s === "idle")   return "status-idle";
      return "status-unknown";
    }

    function ciClass(ci) {
      if (!ci) return "ci-unknown";
      const s = ci.toLowerCase();
      if (s === "success") return "ci-success";
      if (s === "failure" || s === "failed") return "ci-failure";
      if (s === "pending" || s === "in_progress") return "ci-pending";
      return "ci-unknown";
    }

    function sessionHtml(s) {
      const dotCls = statusClass(s.status);
      const nameLabel = escHtml(s.name || s.branch || "—");
      const branchLabel = s.branch && s.branch !== s.name ? `<div class="session-branch">${escHtml(s.branch)}</div>` : "";
      const age = s.age ? `<span class="session-age">${relTime(s.age)}</span>` : "";
      const ci = s.ci ? `<span class="ci-badge ${ciClass(s.ci)}">CI: ${escHtml(s.ci)}</span>` : "";
      const review = s.review ? `<span class="review-badge">${escHtml(s.review)}</span>` : "";
      const pr = s.pr_url ? `<a class="pr-badge" href="${escHtml(s.pr_url)}" target="_blank" rel="noopener">PR #${s.pr || ""}</a>` : "";
      return `
        <div class="session-row">
          <span class="session-status-dot ${dotCls}"></span>
          <div class="session-info">
            <div class="session-name">${nameLabel}</div>
            ${branchLabel}
            <div class="session-meta">${age}${ci}${review}${pr}</div>
          </div>
        </div>`;
    }

    function agentStatusDot(status) {
      if (status === "active")  return `<span class="agent-status-dot status-active" title="Active"></span>`;
      if (status === "idle")    return `<span class="agent-status-dot status-idle" title="Idle"></span>`;
      if (status === "offline") return `<span class="agent-status-dot status-offline" title="Offline"></span>`;
      return `<span class="agent-status-dot status-unknown" title="Unknown"></span>`;
    }

    function shortWorkspace(ws) {
      if (!ws) return "";
      // /Users/aivan/agents/lain → agents/lain
      return ws.replace(/^\/[^/]+\/[^/]+\//, "");
    }

    function agentCardHtml(a) {
      const emoji = a.emoji ? `<span class="agent-emoji">${escHtml(a.emoji)}</span>` : `<span class="agent-emoji">🤖</span>`;
      const name = escHtml(a.name || a.id || "—");
      const dot = agentStatusDot(a.status);
      const lastSeen = a.last_seen ? `<span class="agent-last-seen">${relTime(a.last_seen)}</span>` : "";
      const model = a.model ? `<div class="agent-model">${escHtml(a.model.replace("anthropic/",""))}</div>` : "";
      const ws = a.workspace ? `<div class="agent-workspace" title="${escHtml(a.workspace)}">${escHtml(shortWorkspace(a.workspace))}</div>` : "";
      const statusLabel = a.status ? `<span class="agent-status-label agent-status-${escHtml(a.status)}">${escHtml(a.status)}</span>` : "";
      return `
        <div class="agent-card">
          ${emoji}
          <div class="agent-info">
            <div class="agent-name-row">${dot}<span class="agent-name">${name}</span>${statusLabel}${lastSeen}</div>
            ${model}${ws}
          </div>
        </div>`;
    }

    function renderAgents(data) {
      const agentList = Array.isArray(data.agents) ? data.agents : [];

      document.getElementById("agents-count").textContent = agentList.length;

      document.getElementById("agents-root").innerHTML = agentList.length
        ? agentList.map(agentCardHtml).join("")
        : `<div class="empty-state"><div class="empty-state-icon">BOT</div><div>No agents configured</div><div class="empty-state-detail">Set OPENCLAW_AGENTS_JSON env var to populate this panel</div></div>`;
    }

    let agentsRefreshTimer = null;

    async function loadAgents() {
      try {
        const res = await fetch("/api/agents");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderAgents(data);
      } catch (err) {
        document.getElementById("agents-root").innerHTML =
          `<div class="empty-state"><div class="empty-state-icon">WAIT</div><div>Awaiting agent data</div></div>`;
      }
    }

    // ── System Metrics ─────────────────────────────────────────────

    function barClass(pct) {
      if (pct >= 80) return "bar-red";
      if (pct >= 60) return "bar-yellow";
      return "bar-green";
    }

    function metricBarHtml(label, pct, detail) {
      const cls = barClass(pct);
      const w = Math.min(Math.max(pct, 0), 100).toFixed(1);
      const detailHtml = detail ? `<div class="metric-detail">${escHtml(detail)}</div>` : "";
      return `
        <div class="metric-row">
          <div class="metric-label-row">
            <span class="metric-label">${escHtml(label)}</span>
            <span class="metric-value ${cls}">${pct.toFixed(1)}%</span>
          </div>
          <div class="metric-bar-outer">
            <div class="metric-bar-wrap">
              <div class="metric-bar ${cls}" style="width:${w}%"></div>
            </div>
          </div>
          ${detailHtml}
        </div>`;
    }

    function renderServerMetrics(server, rootId, labelId) {
      if (!server) {
        document.getElementById(rootId).innerHTML = `<div class="empty-panel" style="color:#f85149">No data</div>`;
        if (labelId) document.getElementById(labelId).textContent = "offline";
        return;
      }
      const mem = server.memory || {};
      const disk = server.disk || {};
      const memDetail = (mem.used_gb != null && mem.total_gb != null)
        ? `${mem.used_gb} GB / ${mem.total_gb} GB` : "";
      const diskDetail = (disk.used_gb != null && disk.total_gb != null)
        ? `${disk.used_gb} GB / ${disk.total_gb} GB` : "";

      if (labelId) {
        document.getElementById(labelId).textContent = server.hostname || "live";
      }

      document.getElementById(rootId).innerHTML =
        metricBarHtml("CPU", server.cpu_percent || 0, "") +
        metricBarHtml("Memory", mem.percent || 0, memDetail) +
        metricBarHtml("Disk", disk.percent || 0, diskDetail);
    }

    function renderContainersPanel(server) {
      const labelEl = document.getElementById("hetzner-label");
      const rootEl = document.getElementById("hetzner-root");

      if (!server) {
        rootEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🐳</div>
            <div>No server data</div>
            <div class="empty-state-detail">Server metrics unavailable</div>
          </div>`;
        labelEl.textContent = "—";
        return;
      }

      const containers = Array.isArray(server.containers) ? server.containers : [];
      const dockerAvailable = server.docker_available !== false;

      if (containers.length === 0) {
        if (!dockerAvailable) {
          rootEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🐳</div>
              <div>Docker unavailable</div>
              <div class="empty-state-detail">Mount /var/run/docker.sock to show containers</div>
            </div>`;
        } else {
          rootEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🐳</div>
              <div>No running containers</div>
              <div class="empty-state-detail">Docker is connected — no containers running</div>
            </div>`;
        }
        labelEl.textContent = "0 containers";
        return;
      }

      labelEl.textContent = `${containers.length} container${containers.length !== 1 ? "s" : ""}`;
      const rows = containers.map(c => {
        const name = c.Names || c.Name || c.ID || "?";
        const image = c.Image || "";
        const status = (c.Status || c.State || "").toLowerCase();
        const dotColor = status.includes("up") || status.includes("running")
          ? "#3fb950" : "#f85149";
        return `
          <div class="container-row">
            <span class="container-dot" style="background:${dotColor}"></span>
            <span class="container-name">${escHtml(name)}</span>
            <span class="container-image">${escHtml(image)}</span>
          </div>`;
      }).join("");
      rootEl.innerHTML = `<div class="containers-label">Running containers</div>${rows}`;
    }

    async function loadSystem() {
      try {
        const res = await fetch("/api/system");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        // server = local psutil (Hetzner), mac = mac metrics
        const server = data.server || data.hetzner || data.mac;
        const serverErr = data.server_error || data.hetzner_error;
        if (serverErr) {
          document.getElementById("mac-root").innerHTML =
            `<div class="status-error"><div class="status-error-icon">!</div><div><div>Metrics error</div><div class="status-error-detail">${escHtml(serverErr)}</div></div></div>`;
          document.getElementById("mac-label").textContent = "error";
        } else {
          renderServerMetrics(server, "mac-root", "mac-label");
        }
        renderContainersPanel(server);
      } catch (err) {
        document.getElementById("mac-root").innerHTML =
          `<div class="empty-panel" style="color:#f85149">Error: ${escHtml(err.message)}</div>`;
        document.getElementById("hetzner-root").innerHTML =
          `<div class="status-error"><div class="status-error-icon">!</div><div><div>Metrics unavailable</div><div class="status-error-detail">${escHtml(err.message)}</div></div></div>`;
      }
    }

    function loadAll() {
      loadKanban();
      loadAgents();
      loadSystem();
    }

    // Initial load
    document.getElementById("board-root").innerHTML =
      `<div class="loading-overlay"><div class="spinner"></div><span>Loading kanban…</span></div>`;
    loadAll();

    // Refresh all panels every 30s
    agentsRefreshTimer = setInterval(loadAgents, 30000);
    setInterval(loadSystem, 30000);
  </script>
</body>
</html>
