<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ops Dashboard — Kanban</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;

      --col-backlog:  #21262d;
      --col-progress: #0d2245;
      --col-review:   #2d1e00;
      --col-done:     #0d2818;
      --col-blocked:  #2d0d0d;

      --col-backlog-h:  #30363d;
      --col-progress-h: #1c4a8a;
      --col-review-h:   #7d4e00;
      --col-done-h:     #1a6b3c;
      --col-blocked-h:  #8b1a1a;

      --tag-feat:  #1f6feb; --tag-feat-bg:  #0d2245;
      --tag-fix:   #f85149; --tag-fix-bg:   #2d0d0d;
      --tag-infra: #a371f7; --tag-infra-bg: #1e1240;
      --tag-chore: #8b949e; --tag-chore-bg: #21262d;
      --tag-docs:  #39d353; --tag-docs-bg:  #0d2818;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #refresh-btn:hover { background: var(--border); }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: var(--muted);
      min-width: 120px;
      text-align: right;
    }
    #status.error { color: #f85149; }

    /* ── Board ── */
    .board-wrapper {
      padding: 20px 24px 40px;
      overflow-x: auto;
    }
    .board {
      display: flex;
      gap: 16px;
      min-width: 900px;
      align-items: flex-start;
    }

    /* ── Column ── */
    .column {
      flex: 1;
      min-width: 200px;
      max-width: 300px;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .col-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .col-count {
      background: rgba(255,255,255,0.08);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .col-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }

    /* Column themes */
    .col-backlog  .col-header { background: var(--col-backlog-h);  color: var(--muted); }
    .col-progress .col-header { background: var(--col-progress-h); color: #79c0ff; }
    .col-review   .col-header { background: var(--col-review-h);   color: #e3b341; }
    .col-done     .col-header { background: var(--col-done-h);     color: #3fb950; }
    .col-blocked  .col-header { background: var(--col-blocked-h);  color: #f85149; }

    .col-backlog  { background: var(--col-backlog); }
    .col-progress { background: var(--col-progress); }
    .col-review   { background: var(--col-review); }
    .col-done     { background: var(--col-done); }
    .col-blocked  { background: var(--col-blocked); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-id {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 8px;
      word-break: break-word;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .tag-feat  { color: var(--tag-feat);  background: var(--tag-feat-bg); }
    .tag-fix   { color: var(--tag-fix);   background: var(--tag-fix-bg); }
    .tag-infra { color: var(--tag-infra); background: var(--tag-infra-bg); }
    .tag-chore { color: var(--tag-chore); background: var(--tag-chore-bg); }
    .tag-docs  { color: var(--tag-docs);  background: var(--tag-docs-bg); }
    .tag-other { color: var(--muted); background: #21262d; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-agent {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .agent-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .card-time { font-size: 11px; color: var(--muted); }

    .pr-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #e3b341;
      text-decoration: none;
      border: 1px solid #7d4e0055;
      border-radius: 4px;
      padding: 1px 6px;
      background: #2d1e0055;
      transition: border-color 0.15s;
      margin-top: 6px;
    }
    .pr-link:hover { border-color: #e3b341; color: #e3b341; }
    .pr-icon { font-size: 10px; }

    .empty-col {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      opacity: 0.6;
    }

    /* ── Loading / Error ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #2d0d0d;
      border: 1px solid #8b1a1a;
      border-radius: 8px;
      padding: 16px 20px;
      color: #f85149;
      max-width: 500px;
      margin: 40px auto;
      font-size: 13px;
    }
    .error-box strong { display: block; margin-bottom: 6px; }

    /* ── Repo filter ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px 0;
      flex-wrap: wrap;
    }
    .toolbar-label { font-size: 12px; color: var(--muted); }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #0d2245; }
    .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    @media (max-width: 768px) {
      .board { min-width: unset; flex-direction: column; }
      .column { max-width: 100%; }
      header { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">Ops<span>Dashboard</span></div>
    </div>
    <div class="header-right">
      <button id="refresh-btn" onclick="loadKanban()">↻ Refresh</button>
      <div id="status">Loading…</div>
    </div>
  </header>

  <div class="toolbar" id="toolbar"></div>

  <div class="board-wrapper">
    <div id="board-root"></div>
  </div>

  <script>
    const COLUMNS = [
      { key: "backlog",  label: "Backlog" },
      { key: "progress", label: "In Progress" },
      { key: "review",   label: "Review / PR" },
      { key: "done",     label: "Done" },
      { key: "blocked",  label: "Blocked" },
    ];

    const TAG_CLASS = { feat: "feat", fix: "fix", infra: "infra", chore: "chore", docs: "docs" };

    let allCards = [];
    let activeRepo = "all";
    let refreshTimer = null;
    let countdown = 30;

    function relTime(iso) {
      if (!iso) return "";
      const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function shortId(id) {
      // "ddfeyes/ops-dashboard#13" → "ops-dashboard#13"
      const parts = id.split("/");
      return parts.length > 1 ? parts.slice(1).join("/") : id;
    }

    function cardHtml(card) {
      const tags = (card.tags || []).map(t => {
        const cls = TAG_CLASS[t] || "other";
        return `<span class="tag tag-${cls}">${t}</span>`;
      }).join("");

      const prLink = card.pr_url
        ? `<a class="pr-link" href="${card.pr_url}" target="_blank" rel="noopener">
             <span class="pr-icon">⤷</span> PR
           </a>`
        : "";

      const agent = card.agent
        ? `<span class="card-agent"><span class="agent-dot"></span>${card.agent}</span>`
        : "";

      const ts = card.timestamp ? `<span class="card-time">${relTime(card.timestamp)}</span>` : "";

      return `
        <a class="card" href="${card.url}" target="_blank" rel="noopener">
          <div class="card-id">${shortId(card.id)}</div>
          <div class="card-title">${escHtml(card.title)}</div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ""}
          ${prLink}
          <div class="card-meta">${agent}${ts}</div>
        </a>`;
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
              .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function getRepos(cards) {
      const set = new Set();
      cards.forEach(c => {
        const parts = c.id.split("#");
        if (parts.length > 0) set.add(parts[0]);
      });
      return [...set].sort();
    }

    function renderToolbar(cards) {
      const repos = getRepos(cards);
      if (repos.length <= 1) { document.getElementById("toolbar").innerHTML = ""; return; }

      const buttons = ["all", ...repos].map(r => {
        const active = r === activeRepo ? "active" : "";
        const label = r === "all" ? "All repos" : r.split("/")[1] || r;
        return `<button class="filter-btn ${active}" onclick="setRepo('${r}')">${label}</button>`;
      }).join("");
      document.getElementById("toolbar").innerHTML =
        `<span class="toolbar-label">Repo:</span>${buttons}`;
    }

    function setRepo(repo) {
      activeRepo = repo;
      renderBoard(allCards);
    }

    function renderBoard(cards) {
      renderToolbar(cards);
      const filtered = activeRepo === "all"
        ? cards
        : cards.filter(c => c.id.startsWith(activeRepo + "#") || c.id.startsWith(activeRepo + "/"));

      const byCol = {};
      COLUMNS.forEach(c => { byCol[c.key] = []; });
      filtered.forEach(card => {
        const col = card.column in byCol ? card.column : "backlog";
        byCol[col].push(card);
      });

      const html = COLUMNS.map(col => {
        const colCards = byCol[col.key];
        const cardsHtml = colCards.length
          ? colCards.map(cardHtml).join("")
          : `<div class="empty-col">No items</div>`;
        return `
          <div class="column col-${col.key}">
            <div class="col-header">
              <span>${col.label}</span>
              <span class="col-count">${colCards.length}</span>
            </div>
            <div class="col-cards">${cardsHtml}</div>
          </div>`;
      }).join("");

      document.getElementById("board-root").innerHTML = `<div class="board">${html}</div>`;
    }

    async function loadKanban() {
      clearInterval(refreshTimer);
      const btn = document.getElementById("refresh-btn");
      const status = document.getElementById("status");

      btn.disabled = true;
      status.textContent = "Fetching…";
      status.className = "";

      try {
        const res = await fetch("/api/kanban");
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        allCards = await res.json();
        renderBoard(allCards);
        const now = new Date().toLocaleTimeString();
        countdown = 30;
        status.textContent = `Updated ${now} · next in ${countdown}s`;
        status.className = "";

        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) {
            loadKanban();
          } else {
            const t = new Date().toLocaleTimeString();
            status.textContent = `Updated ${t.split(":").slice(0,2).join(":")}… · next in ${countdown}s`;
          }
        }, 1000);

      } catch (err) {
        document.getElementById("board-root").innerHTML =
          `<div class="error-box"><strong>Failed to load kanban data</strong>${escHtml(err.message)}</div>`;
        status.textContent = "Error — retrying in 30s";
        status.className = "error";
        countdown = 30;
        refreshTimer = setInterval(() => {
          countdown -= 1;
          if (countdown <= 0) loadKanban();
        }, 1000);
      } finally {
        btn.disabled = false;
      }
    }

    // Initial load
    document.getElementById("board-root").innerHTML =
      `<div class="loading-overlay"><div class="spinner"></div><span>Loading kanban…</span></div>`;
    loadKanban();
  </script>
</body>
</html>
