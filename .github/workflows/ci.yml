name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install fastapi uvicorn psutil paramiko httpx pytest
      - run: python -c "from app.main import app; print('import OK')"
      - run: pytest tests/ -v
